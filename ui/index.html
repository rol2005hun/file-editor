<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rust Editor GUI</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>
    <div id="topbar">
        <div class="menu-item" data-menu="file-menu">
            File
            <div class="dropdown" id="file-menu">
                <div class="dropdown-item" id="action-new-file">New File</div>
                <div class="dropdown-item" id="action-new-dir">New Directory</div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item" id="action-save">Save</div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item" id="action-exit">Exit</div>
            </div>
        </div>
        <div class="menu-item" data-menu="edit-menu">
            Edit
            <div class="dropdown" id="edit-menu">
                <div class="dropdown-item">Undo</div>
            </div>
        </div>
        <div class="menu-item">Selection</div>
        <div class="menu-item">View</div>
        <div class="menu-item">Help</div>
    </div>
    <div id="main-container">
        <aside id="sidebar">
            <div class="sidebar-header">Explorer</div>
            <ul id="file-list"></ul>
        </aside>
        <div id="editor-area">
            <div id="tabs-container"></div>
            <textarea id="editor" spellcheck="false"></textarea>
        </div>
    </div>
    <script src="js/state.js"></script>
    <script src="js/main.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
