<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rust Editor</title>
    <style>
        body {
            background-color: "#1e1e1e";
            color: "#d4d4d4";
            font-family: "Consolas", monospace;
            padding: "20px";
            margin: "0";
        }
        #editor {
            white-space: "pre-wrap";
        }
    </style>
</head>
<body>
    <div id="editor"></div>
    <script>
        const invoke = window.__TAURI__.invoke;
        
        invoke("get_document_content").then((content) => {
            document.getElementById("editor").innerText = content;
        });
    </script>
</body>
</html>
